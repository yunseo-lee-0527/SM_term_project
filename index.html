<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyFlow Notes</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="document-tabs">
        <button class="nav-button" id="libraryBtn" title="문서함">‹ 문서</button>
        <div class="tab-strip">
          <button class="tab active">과학적 관리 필기</button>
          <button class="tab">강의자료.pdf</button>
          <button class="tab plus" id="addDocTabBtn" title="문서 탭 추가">+</button>
        </div>
        <div class="document-actions">
          <button class="icon-button" id="newNotebookBtn" title="새 노트">＋</button>
          <button class="icon-button" id="exportBtn" title="PNG로 내보내기">⇩</button>
          <button class="icon-button" id="fullscreenBtn" title="집중 모드">⛶</button>
        </div>
      </header>

      <header class="toolbar" aria-label="필기 도구">
        <div class="left-tools">
          <button class="icon-button" id="undoBtn" title="실행 취소">↶</button>
          <button class="icon-button" title="다시 실행">↷</button>
        </div>

        <div class="center-tools">
          <button class="tool active" data-tool="pen" title="펜">✎</button>
          <button class="tool" data-tool="highlighter" title="형광펜">▰</button>
          <button class="tool" data-tool="eraser" title="지우개">⌫</button>
          <button class="tool" data-tool="lasso" title="올가미">◌</button>
          <button class="tool" data-tool="text" title="텍스트">T</button>
          <button class="tool" id="quickToggleBtn" title="펜/지우개 빠른 전환">⇄</button>
          <button class="tool drawer-toggle" data-drawer="elements" title="요소">◇</button>
          <button class="tool drawer-toggle" data-drawer="assets" title="이미지">▧</button>
        </div>

        <div class="right-tools">
          <button class="pill-button drawer-toggle" data-drawer="break">휴식</button>
          <button class="pill-button drawer-toggle" data-drawer="metrics">기록</button>
        </div>
      </header>

      <section class="tool-settings" aria-label="도구 설정">
        <div class="swatches" aria-label="색상">
          <button class="swatch active" data-color="#1f2937" style="--swatch:#1f2937" title="검정"></button>
          <button class="swatch" data-color="#db2777" style="--swatch:#db2777" title="분홍"></button>
          <button class="swatch" data-color="#2563eb" style="--swatch:#2563eb" title="파랑"></button>
          <button class="swatch" data-color="#16a34a" style="--swatch:#16a34a" title="초록"></button>
          <button class="swatch" data-color="#facc15" style="--swatch:#facc15" title="노랑"></button>
        </div>

        <label class="range-control">
          <span>펜</span>
          <input id="penSize" type="range" min="1" max="18" value="4" />
          <strong id="penSizeValue">4</strong>
        </label>

        <label class="range-control">
          <span>지우개</span>
          <input id="eraserSize" type="range" min="8" max="96" value="34" />
          <strong id="eraserSizeValue">34</strong>
        </label>

        <label class="range-control">
          <span>확대</span>
          <input id="zoomRange" type="range" min="75" max="220" value="100" />
          <strong id="zoomValue">100%</strong>
        </label>
      </section>

      <div class="main-workspace">
        <aside class="page-strip" aria-label="페이지 목록">
          <button class="page-thumb active" data-page="0">
            <span>1</span>
          </button>
          <button class="page-thumb" data-page="1">
            <span>2</span>
          </button>
          <button class="page-thumb" data-page="2">
            <span>3</span>
          </button>
          <button class="add-page" id="addPageBtn">＋</button>
        </aside>

        <section class="paper-stage" id="paperStage">
          <canvas id="noteCanvas" aria-label="필기 페이지"></canvas>
          <input id="textComposer" class="text-composer" type="text" placeholder="텍스트 입력" />
          <div id="selectionBox" class="selection-box" hidden></div>
        </section>
      </div>

      <aside class="floating-drawer" id="drawer-elements" hidden>
        <div class="drawer-header">
          <strong>Elements</strong>
          <button class="drawer-close" data-close>×</button>
        </div>
        <div class="element-grid">
          <button data-element="axis">좌표축</button>
          <button data-element="normal">정규분포</button>
          <button data-element="sine">사인파</button>
          <button data-element="parabola">포물선</button>
          <button data-element="circuit">회로</button>
          <button data-element="vector">벡터</button>
          <button data-element="matrix">행렬</button>
          <button data-element="molecule">분자</button>
          <button data-element="table">표</button>
        </div>
      </aside>

      <aside class="floating-drawer" id="drawer-assets" hidden>
        <div class="drawer-header">
          <strong>이미지</strong>
          <button class="drawer-close" data-close>×</button>
        </div>
        <label class="file-drop">
          이미지 추가
          <input id="imageUpload" type="file" accept="image/*" multiple />
        </label>
        <div id="assetTray" class="asset-tray">
          <p>그래프, 표, PDF 캡처 이미지를 보관했다가 클릭해 삽입합니다.</p>
        </div>
      </aside>

      <aside class="floating-drawer compact" id="drawer-break" hidden>
        <div class="drawer-header">
          <strong>휴식 타이머</strong>
          <button class="drawer-close" data-close>×</button>
        </div>
        <div class="break-card">
          <strong id="breakStatus">25:00</strong>
          <span id="breakHint">집중 필기 구간</span>
        </div>
        <div class="mini-actions">
          <button id="startBreakBtn">시작</button>
          <button id="pauseBreakBtn">정지</button>
          <button id="resetBreakBtn">초기화</button>
        </div>
      </aside>

      <aside class="floating-drawer" id="drawer-metrics" hidden>
        <div class="drawer-header">
          <strong>작업 기록</strong>
          <button class="drawer-close" data-close>×</button>
        </div>
        <div class="metrics">
          <div><span>도구 전환</span><strong id="toolSwitches">0</strong></div>
          <div><span>색 변경</span><strong id="colorSwitches">0</strong></div>
          <div><span>두께 변경</span><strong id="sizeSwitches">0</strong></div>
          <div><span>도형 삽입</span><strong id="elementCount">0</strong></div>
          <div><span>올가미</span><strong id="lassoCount">0</strong></div>
          <div><span>확대 제스처</span><strong id="zoomGestures">0</strong></div>
          <div><span>휴식 횟수</span><strong id="breakCount">0</strong></div>
          <div><span>경과</span><strong id="elapsed">00:00</strong></div>
        </div>
      </aside>

      <dialog class="template-dialog" id="templateDialog">
        <form method="dialog">
          <header>
            <strong>새 노트</strong>
            <button value="cancel">×</button>
          </header>
          <div class="template-grid">
            <button class="template-card" value="lecture" data-template="lecture">
              <span></span>
              <strong>강의 구조화</strong>
            </button>
            <button class="template-card" value="problem" data-template="problem">
              <span></span>
              <strong>문제 풀이</strong>
            </button>
            <button class="template-card" value="lab" data-template="lab">
              <span></span>
              <strong>실험 정리</strong>
            </button>
            <button class="template-card" value="blank" data-template="blank">
              <span></span>
              <strong>빈 종이</strong>
            </button>
          </div>
        </form>
      </dialog>
    </main>

    <script src="app.js"></script>
  </body>
</html>
